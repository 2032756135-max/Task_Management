<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>任务管理</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>TaskFlow</h1>
      <p class="muted">简洁、专注、像苹果官网一样的体验</p>
    </div>
    <div id="authBar"></div>
  </header>

  <main>
    <section class="card login-card" id="loginCard">
      <h2>欢迎登录</h2>
      <p class="muted">默认管理员：admin / admin123</p>
      <label class="muted">登录背景图 URL（可选）</label>
      <input id="bgConfig" placeholder="https://example.com/bg.jpg" />
      <form id="authForm" class="form-grid">
        <input id="username" placeholder="用户名（至少3位）" minlength="3" required />
        <input id="password" type="password" placeholder="密码（至少6位）" minlength="6" required />
        <div class="actions">
          <button type="button" class="primary" onclick="login()">登录</button>
          <button type="button" onclick="register()">注册</button>
        </div>
      </form>
    </section>

    <section class="card hidden" id="taskCard">
      <h2>一句话创建任务</h2>
      <form id="quickTaskForm" class="form-grid">
        <input name="quickText" placeholder="例：明天14:30前完成周报 #工作 p1 @a@b.com remind=90" required />
        <button class="primary" type="submit">快速创建</button>
      </form>

      <h3>高级创建</h3>
      <form id="taskForm" class="form-grid">
        <input name="title" placeholder="任务标题" required />
        <input name="category" placeholder="分类" />
        <select name="priority">
          <option value="high">高优先级</option>
          <option value="medium" selected>中优先级</option>
          <option value="low">低优先级</option>
        </select>
        <input name="dueAt" type="datetime-local" />
        <input name="remindBeforeMinutes" type="number" min="0" placeholder="提前提醒(分钟)" />
        <input name="ownerEmail" type="email" placeholder="提醒邮箱" />
        <input name="notes" placeholder="备注" />
        <button class="primary" type="submit">保存任务</button>
      </form>
    </section>

    <section class="card hidden" id="boardCard">
      <div class="board-title">
        <h2>任务看板（点击切换状态 + 批量操作）</h2>
        <input id="searchInput" placeholder="搜索标题 / 分类..." />
      </div>
      <div class="actions">
        <button onclick="bulkUpdateStatus('doing')">批量设为进行中</button>
        <button onclick="bulkUpdateStatus('done')">批量设为已完成</button>
        <button onclick="bulkUpdateStatus('todo')">批量设为待办</button>
      </div>
      <div class="board-stats" id="boardStats"></div>
      <div class="kanban">
        <div class="col"><h3>待办</h3><div class="list" id="todo"></div></div>
        <div class="col"><h3>进行中</h3><div class="list" id="doing"></div></div>
        <div class="col"><h3>已完成</h3><div class="list" id="done"></div></div>
      </div>
    </section>

    <section class="card hidden" id="reportCard">
      <h2>每周总结报表</h2>
      <button onclick="loadReport()">刷新报表</button>
      <pre id="report"></pre>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
